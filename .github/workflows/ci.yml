name: CI - EP1 Demo

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Listar archivos
        run: ls -la

      - name: Mostrar fecha
        run: date

      - name: Mostrar README
        run: cat README.md

      - name: Final
        run: echo "Workflow ejecutado correctamente"
